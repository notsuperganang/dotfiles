# Layout: DP-2 (eksternal 1920x1080) di ATAS, eDP-2 (laptop 2560x1440) di BAWAH
#
#   Opsi A — Rata kiri:
#   ┌──────────────┐
#   │     DP-2     │
#   │  1920x1080   │
#   └──────────────┘
#   ┌──────────────────────┐
#   │        eDP-2         │
#   │      2560x1440       │
#   └──────────────────────┘
#
#   Opsi B — Tengah (direkomendasikan):
#        ┌──────────────┐
#        │     DP-2     │
#        │  1920x1080   │
#        └──────────────┘
#   ┌──────────────────────┐
#   │        eDP-2         │
#   │      2560x1440       │
#   └──────────────────────┘

# DP-2 digeser ke kanan 320px agar center terhadap eDP-2: (2560-1920)/2 = 320
# UNCOMMENT THIS SPECIFIC LINE BELOW IF YOU WANT TO USE A SECOND SCREEN
monitor = DP-1,  1920x1080@240, 320x0,    1       

# DONT TOUCH THIS, ITS YOUR MAIN MONITOR
monitor = eDP-2, 2560x1440@165, 0x1080,   1.33

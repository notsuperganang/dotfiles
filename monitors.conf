# =============================================================================
# KONFIGURASI MONITOR
# File ini bisa ditimpa oleh nwg-displays (GUI untuk atur layout monitor)
# Install: sudo pacman -S nwg-displays
# =============================================================================

# -----------------------------------------------------------------------------
# MONITOR UTAMA — JANGAN DIUBAH
# -----------------------------------------------------------------------------
monitor = eDP-2, 2560x1440@165, 0x1080, 1.33

# -----------------------------------------------------------------------------
# MONITOR EKSTERNAL (DP-1)
# Uncomment salah satu mode di bawah sesuai kebutuhan
# -----------------------------------------------------------------------------

# Mode 1 — Dual screen (DP-1 di atas, rata tengah terhadap eDP-2)
# Offset 320px ke kanan agar center: (2560 - 1920) / 2 = 320
monitor = DP-1, 1920x1080@240, 320x0, 1

# Mode 2 — Mirror / Presentasi (DP-1 mencerminkan eDP-2)
# monitor = DP-1, 1920x1080@60, 0x0, 1, mirror, eDP-2

# Mode 3 — Extended kiri (DP-1 di sebelah kiri eDP-2)
# monitor = DP-1, 1920x1080@60, -1920x0, 1
